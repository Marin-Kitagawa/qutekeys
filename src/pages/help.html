<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuteSurf — Keybinding Cheatsheet</title>
  <link rel="stylesheet" href="help.css" />
</head>
<body>
  <header>
    <h1>QuteSurf</h1>
    <span class="subtitle">Keybinding Cheatsheet</span>
  </header>

  <div class="search-wrap">
    <input
      id="search"
      type="text"
      placeholder="Search keys, commands, descriptions…"
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <div id="sheet"></div>
  <div id="no-results">No matching bindings found.</div>

  <script src="help.js"></script>
</body>
</html>
